  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv>\n    <\u002Faside>\n\n    <!-- Content -->\n    <main style=\"flex:1; min-width:0; display:flex; flex-direction:column; background:#0a0f17\">\n\n      <!-- Content header -->\n      <header style=\"flex:none; padding:26px 34px 18px; border-bottom:1px solid rgba(255,255,255,.05); display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap\">\n        <div>\n          <div style=\"font-size:11px; font-weight:700; letter-spacing:2.5px; color:var(--accent,#2ecb73); text-transform:uppercase; margin-bottom:6px\">Apuração<\u002Fdiv>\n          <h1 style=\"font-size:26px; font-weight:800; letter-spacing:-.5px; color:#f4f7fa\">Campanhas Rodando<\u002Fh1>\n          <p style=\"font-size:13px; color:#7c8a9c; margin-top:4px\">{{ countLabel }} · acompanhamento de meta, realizado e premiação<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px\">\n          <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:3px\">\n            <span style=\"font-size:10px; font-weight:700; letter-spacing:1.5px; color:#5f6e7e; text-transform:uppercase\">Data Competência<\u002Fspan>\n            <span style=\"font-size:14px; font-weight:700; color:#cfd8e3; font-variant-numeric:tabular-nums\">{{ competencia }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; background:#10171f; border:1px solid rgba(255,255,255,.07); border-radius:9px; padding:3px; gap:2px\">\n            <sc-for list=\"{{ tipoTabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- Summary strip -->\n      <div style=\"flex:none; display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; padding:20px 34px 6px\">\n        <sc-for list=\"{{ summary }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:#101824; border:1px solid rgba(255,255,255,.06); border-radius:12px; padding:14px 16px; min-width:0\">\n            <div style=\"font-size:10.5px; font-weight:700; letter-spacing:1px; color:#5f6e7e; text-transform:uppercase; margin-bottom:7px\">{{ s.label }}<\u002Fdiv>\n            <div style=\"font-size:20px; font-weight:800; color:{{ s.color }}; font-variant-numeric:tabular-nums; letter-spacing:-.5px\">{{ s.value }}<\u002Fdiv>\n            <div style=\"font-size:11px; color:#6b7888; margin-top:3px\">{{ s.hint }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Campaign list -->\n      <div style=\"flex:1; min-height:0; overflow-y:auto; padding:14px 34px 34px\">\n        <sc-if value=\"{{ hasCampaigns }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px\">\n            <sc-for list=\"{{ campaigns }}\" as=\"c\" hint-placeholder-count=\"9\">\n              <div style=\"background:#101824; border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:18px 18px 16px; display:flex; flex-direction:column; gap:14px\" style-hover=\"border-color:rgba(46,203,115,.35)\">\n                <!-- header -->\n                <div style=\"display:flex; align-items:flex-start; gap:10px\">\n                  <div style=\"flex:none; font-size:11px; font-weight:700; color:#8896a8; background:#0a0f17; border:1px solid rgba(255,255,255,.08); border-radius:7px; padding:4px 7px; font-variant-numeric:tabular-nums\">{{ c.id }}<\u002Fdiv>\n                  <div style=\"flex:1; min-width:0\">\n                    <div style=\"font-size:15px; font-weight:700; color:#f4f7fa; line-height:1.25\">{{ c.name }}<\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; gap:7px; margin-top:5px\">\n                      <span style=\"font-size:10.5px; font-weight:600; color:#7c8a9c; background:rgba(255,255,255,.05); border-radius:5px; padding:2px 7px\">{{ c.tipo }}<\u002Fspan>\n                      <sc-if value=\"{{ c.showWinnerBadge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10.5px; font-weight:700; color:var(--accent,#2ecb73); background:rgba(46,203,115,.12); border:1px solid rgba(46,203,115,.25); border-radius:5px; padding:2px 7px\">Premiado<\u002Fspan><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- progress -->\n                <div>\n                  <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px\">\n                    <span style=\"font-size:11px; font-weight:600; color:#6b7888; text-transform:uppercase; letter-spacing:.5px\">Percentual realizado<\u002Fspan>\n                    <span style=\"font-size:14px; font-weight:800; color:{{ c.pctColor }}; font-variant-numeric:tabular-nums\">{{ c.pctLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:7px; border-radius:99px; background:#0a0f17; overflow:hidden; border:1px solid rgba(255,255,255,.05)\">\n                    <div style=\"height:100%; width:{{ c.barWidth }}; background:var(--accent,#2ecb73); border-radius:99px; transform-origin:left; animation:barIn .6s cubic-bezier(.22,1,.36,1) both\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- metrics -->\n                <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding-top:2px; border-top:1px solid rgba(255,255,255,.05)\">\n                  <div style=\"padding-top:12px\">\n                    <div style=\"font-size:10px; font-weight:700; letter-spacing:.5px; color:#5f6e7e; text-transform:uppercase; margin-bottom:5px\">Meta<\u002Fdiv>\n                    <div style=\"font-size:13.5px; font-weight:700; color:#cfd8e3; font-variant-numeric:tabular-nums\">{{ c.metaLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"padding-top:12px\">\n                    <div style=\"font-size:10px; font-weight:700; letter-spacing:.5px; color:#5f6e7e; text-transform:uppercase; margin-bottom:5px\">Realizado<\u002Fdiv>\n                    <div style=\"font-size:13.5px; font-weight:700; color:#f4f7fa; font-variant-numeric:tabular-nums\">{{ c.realLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"padding-top:12px\">\n                    <div style=\"font-size:10px; font-weight:700; letter-spacing:.5px; color:#5f6e7e; text-transform:uppercase; margin-bottom:5px\">Ganhando<\u002Fdiv>\n                    <div style=\"font-size:13.5px; font-weight:700; color:{{ c.ganhoColor }}; font-variant-numeric:tabular-nums\">{{ c.ganhoLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; color:#5f6e7e; gap:10px\">\n            <svg width=\"38\" height=\"38\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"><\u002Fline><\u002Fsvg>\n            <div style=\"font-size:15px; font-weight:700; color:#7c8a9c\">Nenhuma campanha por pontos<\u002Fdiv>\n            <div style=\"font-size:13px\">Não há campanhas do tipo Pontos nesta competência.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2ecb73&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2ecb73&quot;,&quot;#3b82f6&quot;,&quot;#f59e0b&quot;,&quot;#e0457b&quot;],&quot;section&quot;:&quot;Aparência&quot;},&quot;highlightWinners&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Exibição&quot;},&quot;showMetaless&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Exibição&quot;}}\">\nclass Component extends DCLogic {\n  state = { tipo: 'Valor' };\n\n  data() {\n    return [\n      { id: 627, name: 'Pampers Supersec Mega', tipo: 'Valor', objetivo: 0, apurado: 828, pct: 0, premiacao: 15 },\n      { id: 628, name: 'CCM', tipo: 'Valor', objetivo: 3300000, apurado: 2010420.97, pct: 60.92, premiacao: 110010.30 },\n      { id: 629, name: 'CASINHA VICK', tipo: 'Valor', objetivo: 0, apurado: 129, pct: 0, premiacao: 15 },\n      { id: 630, name: 'YPÊ e BANHO A BANHO', tipo: 'Valor', objetivo: 0, apurado: 12, pct: 0, premiacao: 360 },\n      { id: 631, name: 'PIERRE FABRE', tipo: 'Valor', objetivo: 0, apurado: 1, pct: 0, premiacao: 20 },\n      { id: 633, name: 'ESSITY', tipo: 'Valor', objetivo: 5600000, apurado: 2839766.07, pct: 50.71, premiacao: 0 },\n      { id: 634, name: 'ESSITY POSITIVAÇÃO', tipo: 'Valor', objetivo: 4000, apurado: 2562, pct: 64.05, premiacao: 0 },\n      { id: 636, name: 'ALTHAIA VITAMINA D', tipo: 'Valor', objetivo: 0, apurado: 2594, pct: 0, premiacao: 0 },\n      { id: 637, name: 'SUPLEY - DR. PEANUT', tipo: 'Valor', objetivo: 1800000, apurado: 620719.36, pct: 34.48, premiacao: 0 }\n    ];\n  }\n\n  brl(n) {\n    return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor || '#2ecb73';\n    const highlight = this.props.highlightWinners !== false;\n    const showMetaless = this.props.showMetaless !== false;\n    const tipo = this.state.tipo;\n\n    let rows = this.data().filter(c => c.tipo === tipo);\n    if (!showMetaless) rows = rows.filter(c => c.objetivo > 0);\n\n    const campaigns = rows.map(c => {\n      const hasMeta = c.objetivo > 0;\n      const hasGanho = c.premiacao > 0;\n      return {\n        id: c.id,\n        name: c.name,\n        tipo: c.tipo,\n        hasMeta,\n        metaLabel: hasMeta ? this.brl(c.objetivo) : 'Livre',\n        realLabel: this.brl(c.apurado),\n        ganhoLabel: hasGanho ? this.brl(c.premiacao) : '—',\n        ganhoColor: hasGanho ? accent : '#4d5a69',\n        pctLabel: hasMeta ? c.pct.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%' : 'Meta livre',\n        pctColor: hasMeta ? (c.pct >= 100 ? accent : '#cfd8e3') : '#5f6e7e',\n        barWidth: hasMeta ? Math.min(100, c.pct) + '%' : '0%',\n        showWinnerBadge: highlight && hasGanho\n      };\n    });\n\n    const totMeta = rows.reduce((s, c) => s + c.objetivo, 0);\n    const totReal = rows.reduce((s, c) => s + c.apurado, 0);\n    const totGanho = rows.reduce((s, c) => s + c.premiacao, 0);\n    const totPct = totMeta > 0 ? (totReal / totMeta * 100) : 0;\n\n    const tipoTabs = ['Pontos', 'Valor'].map(t => ({\n      label: t,\n      onClick: () => this.setState({ tipo: t }),\n      style: `font-size:12px; font-weight:600; padding:6px 16px; border-radius:7px; border:none; cursor:pointer; transition:.15s; ${t === tipo ? 'background:' + accent + '; color:#06210f' : 'background:transparent; color:#8896a8'}`\n    }));\n\n    const navBase = 'display:flex; align-items:center; gap:12px; width:100%; text-align:left; border:none; cursor:pointer; padding:11px 13px; border-radius:9px; font-size:14px; font-weight:600; font-family:inherit; transition:.15s;';\n    const setRodando = () => this.setState({ tipo: 'Valor' });\n\n    const filterBase = 'display:flex; align-items:center; gap:11px; width:100%; border:none; cursor:pointer; padding:13px 16px; border-radius:11px; font-size:14px; font-weight:600; font-family:inherit; transition:.15s; background:#141d28; color:#aeb9c7;';\n    const filters = [\n      { label: 'Campanha Televendas', active: false, onClick: () => {}, style: filterBase },\n      { label: 'Campanha Comercial', active: true, onClick: () => {}, style: filterBase + ' color:#cfd8e3;' }\n    ];\n\n    return {\n      accentColor: accent,\n      competencia: '30/06/2026',\n      campaigns,\n      hasCampaigns: campaigns.length > 0,\n      isEmpty: campaigns.length === 0,\n      countLabel: campaigns.length + ' campanha' + (campaigns.length === 1 ? '' : 's'),\n      tipoTabs,\n      filters,\n      setRodando,\n      navRecebidasStyle: navBase + ' background:transparent; color:#7c8a9c;',\n      navRodandoStyle: navBase + ' background:rgba(46,203,115,.10); color:#f4f7fa;',\n      summary: [\n        { label: 'Meta total', value: this.brl(totMeta), color: '#cfd8e3', hint: 'Objetivo das campanhas' },\n        { label: 'Realizado total', value: this.brl(totReal), color: '#f4f7fa', hint: 'Valor apurado' },\n        { label: 'Realização', value: totPct.toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%', color: '#cfd8e3', hint: 'Realizado sobre meta' },\n        { label: 'Ganhando', value: this.brl(totGanho), color: accent, hint: 'Premiação acumulada' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
